name: Sync Senate Disclosures

on:
  schedule:
    # Every 6 hours (03:00, 09:00, 15:00, 21:00 UTC = 11:00, 17:00, 23:00, 05:00 SGT)
    - cron: "0 */6 * * *"
  workflow_dispatch:  # allow manual runs from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Senate PTR data
        run: python scripts/fetch_senate.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/senate_ptrs.json
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "Update Senate PTR data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
